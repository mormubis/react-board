name: 🚀 Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  check:
    name: ✅ Check version
    if: github.event_name == 'push'
    outputs:
      changed: ${{ steps.check.outputs.changed }}
      version: ${{ steps.check.outputs.version }}
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4

      - id: check
        uses: EndBug/version-check@v2
        with:
          diff-search: true

  format:
    name: 👔 Format
    uses: ./.github/workflows/format.yml

  lint:
    name: 🔬 Lint
    uses: ./.github/workflows/lint.yml

  test:
    name: 🧪 Test
    uses: ./.github/workflows/test.yml
    secrets: inherit

  release:
    name: 🚀 Release
    permissions:
      id-token: write
      contents: write
    runs-on: ubuntu-latest
    needs: [check, format, lint, test]
    if:
      always() && (needs.check.outputs.changed == 'true' || github.event_name ==
      'workflow_dispatch') && needs.format.result == 'success' &&
      needs.lint.result == 'success' && needs.test.result == 'success'
    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: ⎔ Setup node
        uses: actions/setup-node@v4
        with:
          cache: 'pnpm'
          node-version: 'node'
          registry-url: 'https://registry.npmjs.org'
          scope: '@echecs'

      - name: 📥 Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Release to NPM
        run: pnpm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: 🏷️ Get version
        id: version
        run:
          echo "version=$(node -p 'require("./package.json").version')" >>
          "$GITHUB_OUTPUT"

      - name: 🏷️ Create GitHub Release
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          NOTES=$(awk -v ver="$VERSION" '/^## /{if(found)exit;v=$2;gsub(/[\[\]]/,"",v);if(v==ver){found=1;next}}found{print}' CHANGELOG.md)
          gh release create "v${VERSION}" --title "v${VERSION}" --notes "${NOTES}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
